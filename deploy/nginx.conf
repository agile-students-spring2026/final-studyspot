server {
    listen 80;
    server_name _;   # Replace _ with your droplet IP or domain name

    # Serve the React production build
    root /var/www/studyspot/front-end/build;
    index index.html;

    # React Router — fall back to index.html for client-side routes
    location / {
        try_files $uri /index.html;
    }

    # Proxy all /api/ requests to Express
    location /api/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded images served by Express under /static/
    location /static/ {
        proxy_pass         http://localhost:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
