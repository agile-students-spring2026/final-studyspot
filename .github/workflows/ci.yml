name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: back-end
        run: npm install

      - name: Run tests
        working-directory: back-end
        env:
          JWT_SECRET: test_secret_for_ci
          PORT: 5001
        run: npm test

      - name: Run coverage
        working-directory: back-end
        env:
          JWT_SECRET: test_secret_for_ci
          PORT: 5001
        run: npm run coverage